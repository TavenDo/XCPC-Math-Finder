<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>比赛汇总</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 40px; background-color: #f4f7f6; color: #333; scroll-behavior: smooth; }
        
        /* 顶部导航 */
        .header { display: flex; justify-content: space-between; align-items: center; max-width: 1000px; margin: 0 auto 20px auto; }
        h1 { color: #2c3e50; margin: 0; }
        .btn { text-decoration: none; background-color: #34495e; color: white; padding: 10px 20px; border-radius: 5px; font-weight: bold; transition: background 0.2s; }
        .btn:hover { background-color: #2c3e50; }
        
        /* 🌟 新增：右下角悬浮导航菜单 */
        .floating-nav {
            position: fixed;
            bottom: 40px;
            right: 40px;
            display: flex;
            flex-direction: column; /* 让两个按钮上下排列 */
            gap: 15px;
            z-index: 1000; /* 确保悬浮在最上层，不被表格遮挡 */
        }
        
        .btn-jump { 
            background-color: #3498db; 
            color: white; 
            text-decoration: none; 
            padding: 15px 25px; 
            border-radius: 50px; /* 变成好看的胶囊形状 */
            font-weight: bold; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); /* 添加一点高级的阴影 */
            transition: all 0.3s;
            text-align: center;
        }
        .btn-jump:hover { background-color: #2980b9; transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
        
        .container { max-width: 1000px; margin: 0 auto; padding-bottom: 100px; }
        
        /* 分区标题与分割线 */
        .section-title { margin-top: 40px; margin-bottom: 10px; color: #2c3e50; display: flex; align-items: center; gap: 10px; }
        .section-divider { border: 0; height: 2px; background: linear-gradient(to right, #bdc3c7, transparent); margin-bottom: 20px; }
        
        table { width: 100%; border-collapse: collapse; background: #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.05); border-radius: 8px; overflow: hidden; margin-bottom: 30px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #34495e; color: white; font-weight: 600; }
        tr:hover { background-color: #f8f9fa; }
        a { color: #3498db; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; color: #2980b9; }

        input[type="checkbox"] { transform: scale(1.5); cursor: pointer; }
        
        /* 已做表格的表头颜色改一下，以示区分 */
        #done-table th { background-color: #27ae60; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📚 近年真题</h1>
        <a href="index.html" class="btn">⬅ 返回主页</a>
    </div>

    <div class="floating-nav">
        <a href="#todo-section" class="btn-jump">📌 未做 (<span id="todo-count">0</span>)</a>
        <a href="#done-section" class="btn-jump">✅ 已做 (<span id="done-count">0</span>)</a>
    </div>

    <div class="container">
        <h2 id="todo-section" class="section-title">📌 未做比赛</h2>
        <hr class="section-divider">
        <table>
            <thead>
                <tr>
                    <th width="80px">状态</th>
                    <th width="100px">ID</th>
                    <th>比赛名称</th>
                    <th width="120px">操作</th>
                </tr>
            </thead>
            <tbody id="todo-list">
                </tbody>
        </table>

        <h2 id="done-section" class="section-title">✅ 已做归档</h2>
        <hr class="section-divider">
        <table id="done-table">
            <thead>
                <tr>
                    <th width="80px">状态</th>
                    <th width="100px">ID</th>
                    <th>比赛名称</th>
                    <th width="120px">操作</th>
                </tr>
            </thead>
            <tbody id="done-list">
                </tbody>
        </table>
    </div>

    <script>
        let globalData = [];

        function renderTables() {
            const doneMap = JSON.parse(localStorage.getItem('xcpc_done_records')) || {};
            
            const todoBody = document.getElementById('todo-list');
            const doneBody = document.getElementById('done-list');
            
            todoBody.innerHTML = '';
            doneBody.innerHTML = '';

            let todoCount = 0;
            let doneCount = 0;

            let sortedData = [...globalData].sort((a, b) => b.id - a.id);

            sortedData.forEach(contest => {
                const isDone = doneMap[contest.id] || false;
                const tr = document.createElement('tr');
                
                tr.innerHTML = `
                    <td>
                        <input type="checkbox" ${isDone ? 'checked' : ''} onchange="toggleDone('${contest.id}', ${isDone})">
                    </td>
                    <td>${contest.id}</td>
                    <td>${contest.name}</td>
                    <td><a href="${contest.url}" target="_blank">跳转链接 🚀</a></td>
                `;

                if (isDone) {
                    doneBody.appendChild(tr);
                    doneCount++;
                } else {
                    todoBody.appendChild(tr);
                    todoCount++;
                }
            });

            document.getElementById('todo-count').innerText = todoCount;
            document.getElementById('done-count').innerText = doneCount;
        }

        function toggleDone(contestId, currentState) {
            let message = currentState 
                ? "确认要撤销归档，将其重新放回【未做】列表吗？" 
                : "🎉 太棒了！确定已经完成这场比赛，将其归档吗？";

            if (confirm(message)) {
                const doneMap = JSON.parse(localStorage.getItem('xcpc_done_records')) || {};
                doneMap[contestId] = !currentState;
                localStorage.setItem('xcpc_done_records', JSON.stringify(doneMap));
            }
            
            renderTables();
        }

        fetch('recent_xcpc_contests.json')
            .then(response => response.json())
            .then(data => {
                globalData = data;
                renderTables();
            })
            .catch(error => {
                console.error('读取数据失败:', error);
                document.getElementById('todo-list').innerHTML = '<tr><td colspan="4" style="text-align:center; color:red;">数据加载失败，请确保使用 Live Server 运行。</td></tr>';
            });
    </script>
</body>
</html>
