<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XCPC-Math-Finder</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        h1 { color: #2c3e50; margin-bottom: 40px; font-size: 3em; }
        
        /* 左右按钮容器 */
        .card-container { display: flex; gap: 40px; }
        
        /* 按钮大卡片样式 */
        .nav-card {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 300px; height: 200px; background-color: #fff; border-radius: 15px;
            text-decoration: none; /* 去除超链接自带的下划线 */
            color: #333; font-size: 1.5em; font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        /* 鼠标悬停时的动画效果 */
        .nav-card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.2); }
        
        /* 左右两张卡片分别给点颜色点缀 */
        .card-left { border-bottom: 5px solid #3498db; }
        .card-right { border-bottom: 5px solid #e74c3c; }
        
        .sub-text { font-size: 0.5em; color: #7f8c8d; margin-top: 10px; font-weight: normal; }
    </style>
</head>
<body>

    <h1>XCPC-Math-Finder</h1>
    <h2>by-Bilibili:RavenMan</h2>
    <div class="card-container">
        <a href="contests.html" class="nav-card card-left">
            近年XCPC汇总
            <span class="sub-text">比赛汇总</span>
        </a>

        <a href="#" class="nav-card card-right">
            数学题目训练
            <span class="sub-text">针对性刷题单(建设中)</span>
        </a>
    </div>

</body>
</html>
